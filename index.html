<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>S.T.R.I.P.E. — Agent Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0a0a;height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.01) 2px,rgba(0,255,136,.01) 4px);pointer-events:none;z-index:1000}

/* Scan line sweep */
.scanline{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(180deg,transparent,rgba(0,255,136,.15),transparent);z-index:900;pointer-events:none;opacity:0}
.scanline.go{animation:scandown 1.2s ease forwards}
@keyframes scandown{0%{top:-3px;opacity:1}100%{top:100%;opacity:0}}

/* Phase 1: Scanning */
.scan-phase{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s ease}
.scan-phase.hidden{opacity:0;pointer-events:none}
.scan-ring{width:100px;height:100px;border:1px solid rgba(0,255,136,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;animation:scan-pulse 1.2s ease infinite}
.scan-ring::before{content:'';position:absolute;width:100%;height:100%;border:1px solid rgba(0,255,136,.06);border-radius:50%;animation:scan-expand 1.2s ease infinite}
.scan-dot{width:6px;height:6px;background:#00ff88;border-radius:50%;opacity:.5;animation:scan-dot-pulse .8s ease infinite}
@keyframes scan-pulse{0%,100%{border-color:rgba(0,255,136,.12)}50%{border-color:rgba(0,255,136,.25)}}
@keyframes scan-expand{0%{transform:scale(1);opacity:1}100%{transform:scale(1.8);opacity:0}}
@keyframes scan-dot-pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.3)}}
.scan-text{margin-top:20px;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:#00cc6a;opacity:.3;animation:scan-text-pulse 1.2s ease infinite}
@keyframes scan-text-pulse{0%,100%{opacity:.2}50%{opacity:.5}}

/* Glitch flash */
.glitch-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:800;pointer-events:none;opacity:0}
.glitch-overlay.go{animation:glitch-seq .5s steps(1) forwards}
@keyframes glitch-seq{0%{opacity:0}5%{opacity:1;background:#00ff88}8%{opacity:0}12%{opacity:1;background:rgba(0,255,136,.06)}15%{opacity:0}20%{opacity:1;background:rgba(0,229,255,.08)}23%{opacity:0}30%{opacity:1;background:rgba(0,255,136,.03)}35%{opacity:0}100%{opacity:0}}

/* Tear lines */
.tear{position:fixed;left:0;right:0;height:2px;background:#00ff88;z-index:850;pointer-events:none;opacity:0}
.tear.go{animation:tear-flash .3s steps(1) forwards}
.tear:nth-child(2).go{animation-delay:.05s}
.tear:nth-child(3).go{animation-delay:.1s}
.tear:nth-child(4).go{animation-delay:.02s}
@keyframes tear-flash{0%{opacity:0}10%{opacity:.6}20%{opacity:0}30%{opacity:.3}40%{opacity:0}100%{opacity:0}}

/* Border flash */
.border-flash{position:fixed;top:0;left:0;right:0;bottom:0;border:2px solid transparent;z-index:700;pointer-events:none}
.border-flash.go{animation:border-pulse .8s ease forwards}
@keyframes border-pulse{0%{border-color:transparent}10%{border-color:rgba(0,255,136,.4)}30%{border-color:rgba(0,255,136,.1)}60%{border-color:rgba(0,255,136,.05)}100%{border-color:transparent}}

/* ===== Phase 2: Tick + Verified ===== */
.verify-phase{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none}
.verify-phase.visible{opacity:1;pointer-events:auto}

/* Tick circle + checkmark */
.tick-wrap{position:relative;width:90px;height:90px;margin-bottom:28px}

.tick-circle{width:90px;height:90px;border-radius:50%;position:absolute;top:0;left:0}
.tick-circle circle{fill:none;stroke:#00ff88;stroke-width:2;stroke-dasharray:283;stroke-dashoffset:283;stroke-linecap:round;opacity:0}
.tick-circle.in circle{animation:circle-draw .6s cubic-bezier(.65,0,.35,1) forwards;opacity:1}
@keyframes circle-draw{0%{stroke-dashoffset:283}100%{stroke-dashoffset:0}}

/* Glow behind tick */
.tick-glow{position:absolute;top:50%;left:50%;width:60px;height:60px;transform:translate(-50%,-50%);border-radius:50%;background:rgba(0,255,136,.06);opacity:0}
.tick-glow.in{animation:glow-pulse .4s ease .5s forwards}
@keyframes glow-pulse{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}}

/* The checkmark */
.tick-check{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.tick-check polyline{fill:none;stroke:#00ff88;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:40;stroke-dashoffset:40;opacity:0}
.tick-check.in polyline{animation:check-draw .35s cubic-bezier(.65,0,.35,1) .55s forwards;opacity:1}
@keyframes check-draw{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}

/* Micro flash when tick completes */
.tick-flash{position:absolute;top:50%;left:50%;width:90px;height:90px;transform:translate(-50%,-50%);border-radius:50%;background:rgba(0,255,136,.12);opacity:0;pointer-events:none}
.tick-flash.in{animation:tick-burst .3s ease .85s forwards}
@keyframes tick-burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}30%{opacity:.3}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}

/* Status text under tick */
.verified-text{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#00ff88;opacity:0;margin-bottom:32px}
.verified-text.in{animation:snap-in .2s ease 1s forwards}

/* Big GRANTED */
.granted-main{font-family:'Outfit',sans-serif;font-size:40px;font-weight:700;color:#00ff88;text-shadow:0 0 60px rgba(0,255,136,.3),0 0 120px rgba(0,255,136,.1);letter-spacing:3px;opacity:0;transform:scale(1.15);text-align:center;line-height:1.1}
.granted-main.in{animation:slam-in .2s cubic-bezier(.16,1,.3,1) 1.2s forwards}
@keyframes slam-in{0%{opacity:0;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}

.granted-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#00cc6a;opacity:0;margin-top:14px}
.granted-sub.in{animation:snap-in .15s ease 1.45s forwards}
@keyframes snap-in{0%{opacity:0;transform:translateY(8px)}100%{opacity:.6;transform:translateY(0)}}

/* Divider */
.v-line{width:0;height:1px;background:rgba(0,255,136,.15);margin-top:28px;opacity:0}
.v-line.in{animation:line-grow .4s ease 1.7s forwards}
@keyframes line-grow{from{width:0;opacity:0}to{width:160px;opacity:1}}

/* Details */
.v-details{margin-top:20px;display:flex;flex-direction:column;align-items:center;gap:6px}
.v-detail{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:#00cc6a;opacity:0}
.v-detail .val{color:#00ff88;font-weight:500}
.v-detail:nth-child(1).in{animation:detail-in .2s ease 1.9s forwards}
.v-detail:nth-child(2).in{animation:detail-in .2s ease 2.0s forwards}
.v-detail:nth-child(3).in{animation:detail-in .2s ease 2.1s forwards}
@keyframes detail-in{from{opacity:0;transform:translateX(-6px)}to{opacity:.5;transform:translateX(0)}}

.v-footer{position:fixed;bottom:28px;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#555;opacity:0}
.v-footer.in{animation:snap-in .3s ease 2.4s forwards}
</style>
</head>
<body>

<div class="glitch-overlay" id="glitch"></div>
<div class="scanline" id="scanline"></div>
<div class="border-flash" id="borderFlash"></div>
<div class="tear" id="t1" style="top:25%"></div>
<div class="tear" id="t2" style="top:50%"></div>
<div class="tear" id="t3" style="top:70%"></div>
<div class="tear" id="t4" style="top:40%"></div>

<!-- Phase 1: Scanning -->
<div class="scan-phase" id="scanPhase">
  <div class="scan-ring"><div class="scan-dot"></div></div>
  <div class="scan-text">Verifying credentials...</div>
</div>

<!-- Phase 2: Verified -->
<div class="verify-phase" id="verifyPhase">

  <!-- Tick -->
  <div class="tick-wrap">
    <div class="tick-glow" id="tickGlow"></div>
    <div class="tick-flash" id="tickFlash"></div>
    <svg class="tick-circle" id="tickCircle" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="42" transform="rotate(-90 45 45)"/>
    </svg>
    <svg class="tick-check" id="tickCheck" viewBox="0 0 90 90">
      <polyline points="28,47 40,58 62,34"/>
    </svg>
  </div>

  <div class="verified-text" id="vText">Agent Verified</div>

  <div class="granted-main" id="gMain">CLEARANCE<br>GRANTED</div>
  <div class="granted-sub" id="gSub">Welcome to HQ</div>

  <div class="v-line" id="vLine"></div>

  <div class="v-details">
    <div class="v-detail" id="d1">Designation: <span class="val">Field Operative</span></div>
    <div class="v-detail" id="d2">Clearance: <span class="val">Level 4</span></div>
    <div class="v-detail" id="d3">Status: <span class="val">Active</span></div>
  </div>

  <div class="v-footer" id="vFooter">S.T.R.I.P.E. // Origins Protocol</div>
</div>

<script>
setTimeout(() => {
  // Fire glitch effects
  document.getElementById('glitch').classList.add('go');
  document.getElementById('scanline').classList.add('go');
  document.getElementById('borderFlash').classList.add('go');
  document.getElementById('t1').classList.add('go');
  document.getElementById('t2').classList.add('go');
  document.getElementById('t3').classList.add('go');
  document.getElementById('t4').classList.add('go');

  // Swap phases
  document.getElementById('scanPhase').classList.add('hidden');
  document.getElementById('verifyPhase').classList.add('visible');

  // Trigger tick sequence
  document.getElementById('tickCircle').classList.add('in');
  document.getElementById('tickCheck').classList.add('in');
  document.getElementById('tickGlow').classList.add('in');
  document.getElementById('tickFlash').classList.add('in');

  // Trigger text sequence
  document.getElementById('vText').classList.add('in');
  document.getElementById('gMain').classList.add('in');
  document.getElementById('gSub').classList.add('in');
  document.getElementById('vLine').classList.add('in');
  document.getElementById('d1').classList.add('in');
  document.getElementById('d2').classList.add('in');
  document.getElementById('d3').classList.add('in');
  document.getElementById('vFooter').classList.add('in');

}, 1500);
</script>
</body>
</html>
